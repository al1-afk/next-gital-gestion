# GestiQ — Production Nginx config
# Place at: /etc/nginx/sites-available/gestiq

server {
    listen 80;
    server_name gestiq.com www.gestiq.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gestiq.com www.gestiq.com;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/gestiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestiq.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-Frame-Options           "DENY"          always;
    add_header Referrer-Policy           "strict-origin" always;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/m;

    # Frontend (built React app)
    root /var/www/gestiq/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # Stricter limit on auth
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Block scanners
    location ~* (\.env|\.git|wp-admin|xmlrpc) {
        return 404;
    }
}
